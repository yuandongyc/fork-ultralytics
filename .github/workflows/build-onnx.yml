name: Build ONNX Models

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      models:
        description: 'Models to build (comma-separated, e.g., yolo26n,yolo26s)'
        required: false
        default: 'yolo26n'
      imgsz:
        description: 'Input image size'
        required: false
        default: '640'
      dynamic:
        description: 'Enable dynamic input shapes'
        required: false
        type: boolean
        default: false
      simplify:
        description: 'Simplify ONNX model with onnxslim'
        required: false
        type: boolean
        default: true
      half:
        description: 'Export to FP16 (half precision)'
        required: false
        type: boolean
        default: false
      nms:
        description: 'Include NMS in the model (end-to-end)'
        required: false
        type: boolean
        default: false
      opset:
        description: 'ONNX opset version (leave empty for auto)'
        required: false
        default: ''
      batch:
        description: 'Batch size for export'
        required: false
        default: '1'
      verify:
        description: 'Verify exported model with inference test'
        required: false
        type: boolean
        default: true

jobs:
  build-onnx:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(format('[{0}]', inputs.models)) }}
        include:
          - model: yolo26n
            imgsz: 640
          - model: yolo26s
            imgsz: 640
          - model: yolo26m
            imgsz: 640
          - model: yolo26l
            imgsz: 640
          - model: yolo26x
            imgsz: 640
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[export]" \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Check environment
        run: |
          yolo checks
          uv pip list

      - name: Build ONNX model
        run: |
          MODEL="${{ matrix.model }}.pt"
          IMGSZ="${{ inputs.imgsz }}"
          DYNAMIC="${{ inputs.dynamic }}"
          SIMPLIFY="${{ inputs.simplify }}"
          HALF="${{ inputs.half }}"
          NMS="${{ inputs.nms }}"
          OPSET="${{ inputs.opset }}"
          BATCH="${{ inputs.batch }}"
          
          echo "Building ONNX model: $MODEL"
          echo "Image size: $IMGSZ"
          echo "Dynamic: $DYNAMIC"
          echo "Simplify: $SIMPLIFY"
          echo "Half precision: $HALF"
          echo "Include NMS: $NMS"
          echo "Opset: $OPSET"
          echo "Batch size: $BATCH"
          
          CMD="yolo export model=$MODEL format=onnx imgsz=$IMGSZ batch=$BATCH"
          
          if [ "$DYNAMIC" = "true" ]; then
            CMD="$CMD dynamic=True"
          fi
          
          if [ "$SIMPLIFY" = "true" ]; then
            CMD="$CMD simplify=True"
          fi
          
          if [ "$HALF" = "true" ]; then
            CMD="$CMD half=True"
          fi
          
          if [ "$NMS" = "true" ]; then
            CMD="$CMD nms=True"
          fi
          
          if [ -n "$OPSET" ]; then
            CMD="$CMD opset=$OPSET"
          fi
          
          echo "Executing: $CMD"
          eval $CMD

      - name: Verify ONNX model
        if: inputs.verify == 'true'
        run: |
          python -c "
          from ultralytics import YOLO
          from pathlib import Path
          
          model_file = '${{ matrix.model }}.onnx'
          if not Path(model_file).exists():
              raise FileNotFoundError(f'Model file {model_file} not found!')
          
          model = YOLO(model_file)
          results = model('ultralytics/assets/zidane.jpg')
          print(f'ONNX model {model_file} verified successfully!')
          print(f'Input shape: {model.info.get(\"input_shape\", \"N/A\")}')
          print(f'Output shape: {model.info.get(\"output_shape\", \"N/A\")}')
          "

      - name: Get model info
        run: |
          python -c "
          from pathlib import Path
          import json
          
          model_file = '${{ matrix.model }}.onnx'
          file_size_mb = Path(model_file).stat().st_size / (1024 * 1024)
          
          info = {
              'model': '${{ matrix.model }}',
              'format': 'onnx',
              'file_size_mb': round(file_size_mb, 2),
              'imgsz': '${{ inputs.imgsz }}',
              'dynamic': ${{ inputs.dynamic }},
              'simplify': ${{ inputs.simplify }},
              'half': ${{ inputs.half }},
              'nms': ${{ inputs.nms }},
              'batch': ${{ inputs.batch }}
          }
          
          with open('${{ matrix.model }}_info.json', 'w') as f:
              json.dump(info, f, indent=2)
          
          print(json.dumps(info, indent=2))
          "

      - name: Upload ONNX artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.model }}-onnx
          path: |
            ${{ matrix.model }}.onnx
            ${{ matrix.model }}_info.json
          retention-days: 30

      - name: Generate summary
        run: |
          echo "## ONNX Model Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Model**: ${{ matrix.model }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Format**: ONNX" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Size**: ${{ inputs.imgsz }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dynamic**: ${{ inputs.dynamic }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Simplify**: ${{ inputs.simplify }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Half Precision**: ${{ inputs.half }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Include NMS**: ${{ inputs.nms }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Batch Size**: ${{ inputs.batch }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Model Information" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat ${{ matrix.model }}_info.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  build-matrix:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        model: ['yolo26n', 'yolo26s']
        task: ['detect', 'segment', 'pose', 'classify', 'obb']
        dynamic: [false, true]
        simplify: [true]
        exclude:
          - task: classify
            dynamic: true
          - task: pose
            dynamic: true
          - task: segment
            dynamic: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[export]" \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Check environment
        run: |
          yolo checks

      - name: Build ONNX model
        run: |
          MODEL="${{ matrix.model }}-${{ matrix.task }}.pt"
          IMGSZ=640
          if [ "${{ matrix.task }}" == "classify" ]; then
            IMGSZ=224
          fi
          
          CMD="yolo export model=$MODEL format=onnx imgsz=$IMGSZ"
          
          if [ "${{ matrix.dynamic }}" = "true" ]; then
            CMD="$CMD dynamic=True"
          fi
          
          if [ "${{ matrix.simplify }}" = "true" ]; then
            CMD="$CMD simplify=True"
          fi
          
          echo "Building: $CMD"
          eval $CMD

      - name: Verify ONNX model
        run: |
          python -c "
          from ultralytics import YOLO
          from pathlib import Path
          
          model_file = '${{ matrix.model }}-${{ matrix.task }}.onnx'
          if not Path(model_file).exists():
              raise FileNotFoundError(f'Model file {model_file} not found!')
          
          model = YOLO(model_file)
          results = model('ultralytics/assets/zidane.jpg')
          print(f'ONNX model {model_file} verified successfully!')
          "

      - name: Upload ONNX artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.model }}-${{ matrix.task }}-onnx
          path: ${{ matrix.model }}-${{ matrix.task }}.onnx
          retention-days: 30

      - name: Prune uv cache
        run: uv cache prune --ci