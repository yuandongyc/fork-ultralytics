name: Build ONNX Models with Runtime

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to build (e.g., yolo26n)'
        required: true
        default: 'yolo26n'
      imgsz:
        description: 'Input image size'
        required: false
        default: '640'
      dynamic:
        description: 'Enable dynamic input shapes'
        required: false
        type: boolean
        default: false
      simplify:
        description: 'Simplify ONNX model'
        required: false
        type: boolean
        default: true
      half:
        description: 'Export to FP16'
        required: false
        type: boolean
        default: false
      nms:
        description: 'Include NMS'
        required: false
        type: boolean
        default: false
      verify:
        description: 'Verify model with runtime'
        required: false
        type: boolean
        default: true

jobs:
  build-onnx-with-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[export]" \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Install runtime dependencies
        run: |
          uv pip install --system \
            onnxruntime \
            opencv-python \
            numpy

      - name: Check environment
        run: |
          yolo checks
          uv pip list

      - name: Build ONNX model
        run: |
          MODEL="${{ inputs.model }}.pt"
          IMGSZ="${{ inputs.imgsz }}"
          DYNAMIC="${{ inputs.dynamic }}"
          SIMPLIFY="${{ inputs.simplify }}"
          HALF="${{ inputs.half }}"
          NMS="${{ inputs.nms }}"
          
          echo "Building ONNX model: $MODEL"
          echo "Image size: $IMGSZ"
          echo "Dynamic: $DYNAMIC"
          echo "Simplify: $SIMPLIFY"
          echo "Half precision: $HALF"
          echo "Include NMS: $NMS"
          
          CMD="yolo export model=$MODEL format=onnx imgsz=$IMGSZ"
          
          if [ "$DYNAMIC" = "true" ]; then
            CMD="$CMD dynamic=True"
          fi
          
          if [ "$SIMPLIFY" = "true" ]; then
            CMD="$CMD simplify=True"
          fi
          
          if [ "$HALF" = "true" ]; then
            CMD="$CMD half=True"
          fi
          
          if [ "$NMS" = "true" ]; then
            CMD="$CMD nms=True"
          fi
          
          echo "Executing: $CMD"
          eval $CMD

      - name: Verify ONNX model with runtime
        if: inputs.verify == 'true'
        run: |
          python3 << 'EOF'
          import cv2
          import numpy as np
          import onnxruntime as ort
          from pathlib import Path
          
          model_file = '${{ inputs.model }}.onnx'
          test_image = 'ultralytics/assets/zidane.jpg'
          
          if not Path(model_file).exists():
              raise FileNotFoundError(f'Model file {model_file} not found!')
          
          if not Path(test_image).exists():
              raise FileNotFoundError(f'Test image {test_image} not found!')
          
          print(f'Loading ONNX model: {model_file}')
          session = ort.InferenceSession(model_file)
          
          input_name = session.get_inputs()[0].name
          output_name = session.get_outputs()[0].name
          
          print(f'Input name: {input_name}')
          print(f'Output name: {output_name}')
          print(f'Input shape: {session.get_inputs()[0].shape}')
          print(f'Output shape: {session.get_outputs()[0].shape}')
          
          print(f'\\nReading test image: {test_image}')
          image = cv2.imread(test_image)
          resized = cv2.resize(image, (640, 640))
          normalized = resized.astype(np.float32) / 255.0
          transposed = normalized.transpose(2, 0, 1)
          input_data = np.expand_dims(transposed, axis=0)
          
          print(f'Input data shape: {input_data.shape}')
          
          print('\\nRunning inference...')
          outputs = session.run([output_name], {input_name: input_data})
          
          print(f'Output shape: {outputs[0].shape}')
          print(f'\\n✅ ONNX model {model_file} verified successfully with runtime!')
          print(f'✅ OpenCV version: {cv2.__version__}')
          print(f'✅ ONNX Runtime version: {ort.__version__}')
          print(f'✅ NumPy version: {np.__version__}')
          EOF

      - name: Get model info
        run: |
          python3 << 'EOF'
          from pathlib import Path
          import json
          
          model_file = '${{ inputs.model }}.onnx'
          if Path(model_file).exists():
              file_size_mb = Path(model_file).stat().st_size / (1024 * 1024)
              
              dynamic = '${{ inputs.dynamic }}' == 'true'
              simplify = '${{ inputs.simplify }}' == 'true'
              half = '${{ inputs.half }}' == 'true'
              nms = '${{ inputs.nms }}' == 'true'
              
              info = {
                  'model': '${{ inputs.model }}',
                  'format': 'onnx',
                  'file_size_mb': round(file_size_mb, 2),
                  'imgsz': '${{ inputs.imgsz }}',
                  'dynamic': dynamic,
                  'simplify': simplify,
                  'half': half,
                  'nms': nms,
                  'runtime_dependencies': {
                      'onnxruntime': 'installed',
                      'opencv-python': 'installed',
                      'numpy': 'installed'
                  }
              }
              
              with open('${{ inputs.model }}_info.json', 'w') as f:
                  json.dump(info, f, indent=2)
              
              print(json.dumps(info, indent=2))
          else:
              print(f'Warning: {model_file} not found, skipping info generation')
          EOF

      - name: Upload ONNX artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.model }}-onnx-with-runtime
          path: |
            ${{ inputs.model }}.onnx
            ${{ inputs.model }}_info.json
          retention-days: 30

      - name: Generate summary
        run: |
          echo "## ONNX Model Build Summary (with Runtime)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Model**: ${{ inputs.model }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Format**: ONNX" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Size**: ${{ inputs.imgsz }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dynamic**: ${{ inputs.dynamic }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Simplify**: ${{ inputs.simplify }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Half Precision**: ${{ inputs.half }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Include NMS**: ${{ inputs.nms }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Runtime Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ onnxruntime" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ opencv-python" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ numpy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ inputs.model }}_info.json" ]; then
            echo "### Model Information" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat ${{ inputs.model }}_info.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Prune uv cache
        run: uv cache prune --ci
